<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R5RS Scheme Web Interpreter</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #1a1a1a;
            color: #eee;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 { margin-top: 0; }
        #terminal-container {
            flex-grow: 1;
            background-color: #000;
            border-radius: 8px;
            overflow: hidden;
            padding: 10px;
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #444; }
    </style>
</head>
<body>
    <h1>R5RS Scheme</h1>
    <div class="controls">
        <button onclick="loadExample('factorial.scm')">Factorial Example</button>
        <button onclick="loadExample('mandelbrot.scm')">Mandelbrot Example</button>
        <button onclick="loadExample('nqueens.scm')">N-Queens Example</button>
    </div>
    <div id="terminal-container"></div>

    <script src="web_client.js"></script>
    <script>
        const term = new Terminal({
            cursorBlink: true,
            theme: {
                background: '#000000'
            }
        });
        term.open(document.getElementById('terminal-container'));
        term.writeln('\x1b[1;36mWelcome to R5RS Scheme Web Interpreter\x1b[0m');
        term.writeln('Initializing Web Worker...');

        const client = new SchemeClient();

        let currentLine = '';
        let history = JSON.parse(localStorage.getItem('repl_history') || '[]');
        let historyIndex = history.length;

        function saveHistory() {
            localStorage.setItem('repl_history', JSON.stringify(history.slice(-100)));
        }

        async function loadExample(name) {
            try {
                const response = await fetch('examples/' + name);
                if (!response.ok) throw new Error('Failed to fetch example: ' + name);
                const code = await response.text();
                term.writeln('\x1b[1;33mLoading ' + name + '...\x1b[0m');
                const data = await client.execute(code);
                if (data.output) term.write(data.output.replace(/\n/g, '\r\n'));
                term.writeln(data.result);
                term.write('scheme> ');
            } catch (err) {
                term.writeln('\x1b[31mError loading example: ' + err + '\x1b[0m');
                term.write('scheme> ');
            }
        }

        function isBalanced(code) {
            let count = 0;
            let inString = false;
            for (let i = 0; i < code.length; i++) {
                if (code[i] === '"' && (i === 0 || code[i-1] !== '\\')) {
                    inString = !inString;
                }
                if (!inString) {
                    if (code[i] === '(') count++;
                    if (code[i] === ')') count--;
                }
            }
            return count <= 0;
        }

        // Signal ready
        setTimeout(async () => {
            term.writeln('Worker Ready.');
            
            // Handle URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const loadParam = urlParams.get('load');
            if (loadParam) {
                await loadExample(loadParam);
            } else {
                term.write('scheme> ');
            }
        }, 500);

        term.onData(e => {
            switch (e) {
                case '\r': // Enter
                    term.write('\r\n');
                    const trimmed = currentLine.trim();
                    if (trimmed.length > 0) {
                        if (isBalanced(currentLine)) {
                            // Add to history if not empty and different from last
                            if (history.length === 0 || history[history.length - 1] !== currentLine) {
                                history.push(currentLine);
                                saveHistory();
                            }
                            historyIndex = history.length;

                            client.execute(currentLine)
                                .then(data => {
                                    if (data.output) term.write(data.output.replace(/\n/g, '\r\n'));
                                    term.writeln(data.result);
                                    term.write('scheme> ');
                                })
                                .catch(err => {
                                    term.writeln('\x1b[31mError: ' + err + '\x1b[0m');
                                    term.write('scheme> ');
                                });
                            currentLine = '';
                        } else {
                            term.write('     > ');
                            currentLine += '\n';
                        }
                    } else {
                        term.write('scheme> ');
                        currentLine = '';
                    }
                    break;
                case '\u007F': // Backspace (DEL)
                    if (currentLine.length > 0) {
                        currentLine = currentLine.slice(0, -1);
                        term.write('\b \b');
                    }
                    break;
                case '\u001b[A': // Up Arrow
                    if (historyIndex > 0) {
                        historyIndex--;
                        // Clear current line
                        for (let i = 0; i < currentLine.length; i++) term.write('\b \b');
                        currentLine = history[historyIndex];
                        term.write(currentLine);
                    }
                    break;
                case '\u001b[B': // Down Arrow
                    if (historyIndex < history.length) {
                        historyIndex++;
                        // Clear current line
                        for (let i = 0; i < currentLine.length; i++) term.write('\b \b');
                        if (historyIndex === history.length) {
                            currentLine = '';
                        } else {
                            currentLine = history[historyIndex];
                        }
                        term.write(currentLine);
                    }
                    break;
                default:
                    if (e >= ' ' && e <= '~') {
                        currentLine += e;
                        term.write(e);
                    }
            }
        });
    </script>
</body>
</html>
